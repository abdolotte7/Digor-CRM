name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck-and-build:
    name: Typecheck & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Typecheck (root + all packages)
        run: pnpm run typecheck

      - name: Build shared libraries
        run: |
          pnpm --filter @workspace/db run build || true
          pnpm --filter @workspace/api-spec run build || true
          pnpm --filter @workspace/api-zod run build || true
          pnpm --filter @workspace/api-client-react run build || true

      - name: Build applications
        run: |
          pnpm --filter @workspace/api-server run build
          pnpm --filter @workspace/digor-crm run build
          pnpm --filter @workspace/digor-tools run build
          pnpm --filter @workspace/digor-website run build
        env:
          NODE_ENV: production
          PORT: "8080"
